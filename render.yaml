services:
  - type: web
    # Match this to the existing Render frontend service name before syncing
    # as a Blueprint, otherwise Render can create a second service.
    name: proyect-ec-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
